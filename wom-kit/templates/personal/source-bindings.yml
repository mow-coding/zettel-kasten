version: source-bindings/v0.1
archive_id: archive:personal:template
sources:
  - source_id: local:personal-documents
    source_type: local_folder
    enabled: true
    description: Personal computer folder selected for metadata-only mapping.
    root_ref: ARCHIVE_PERSONAL_DOCUMENTS_ROOT
    scope_policy:
      mode: metadata_only
      include:
        - "**/*"
      exclude:
        - ".git/**"
        - "__pycache__/**"
      max_items: 2000
    visibility:
      scope: private
      source_visibility: private
    provenance:
      registered_by: template
  - source_id: object:manifest
    source_type: object_manifest
    enabled: true
    description: Archive object manifest as a source map input.
    root_ref: archive:objects/manifests/files.jsonl
    scope_policy:
      mode: metadata_only
      include:
        - "**/*"
      exclude: []
      max_items: 2000
    visibility:
      scope: private
      source_visibility: private
    provenance:
      registered_by: template
