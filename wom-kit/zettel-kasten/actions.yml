schema_version: wom-kit/zettel-kasten-actions/v0.2-draft
zettel_kasten_id: zettel-kasten:wom-kit:base
status: draft
description: >
  Controlled action definitions for WOM-kit. Actions describe allowed
  archive changes before they become CLI commands, MCP tools, or scripts.

defaults:
  actor_type: Principal
  receipt_required_for:
    - promote_zettel
    - import_workpack
    - share_to_archive
    - transfer_to_archive
    - inherit_to_archive
  human_approval_required_for:
    - promote_zettel
    - share_to_archive
    - transfer_to_archive
    - inherit_to_archive
    - destructive_change

actions:
  - action_id: create_draft_zettel
    display_name: Create draft zettel
    status: draft
    category: zettel
    description: Create a new AI-written or user-captured zettel draft in the archive inbox.
    actor_types:
      - person
      - ai_runtime
    inputs:
      required:
        - archive_id
        - title
        - body
      optional:
        - kind
        - facets
        - assets
        - edges
        - visibility
        - promotion
    policy_checks:
      - mounted_archives_only
      - ai_default_write_inbox_only
      - provider_urls_forbidden_in_zettels
      - drafts_may_be_incomplete
    preconditions:
      - Target archive is mounted with write access.
      - Draft path is inside root_policy.ai_inbox.
    writes:
      - inbox/*.md
    outputs:
      - zettel_id
      - draft_path
    receipt:
      required: false

  - action_id: promote_zettel
    display_name: Promote zettel
    status: draft
    category: zettel
    description: Move or copy a draft zettel from inbox into canonical zettels after human approval.
    actor_types:
      - person
      - ai_runtime
    inputs:
      required:
        - draft_path
        - archive_id
      optional:
        - canonical_id
        - edit_summary
        - promotion_summary
        - reviewer
    policy_checks:
      - mounted_archives_only
      - canonical_zettel_requires_human_promotion
      - zettel_required_frontmatter
      - provider_urls_forbidden_in_zettels
      - promotion_checklist_required
      - canonical_zettel_must_be_self_contained
      - one_idea_or_explicit_record
    preconditions:
      - Draft exists in inbox.
      - Human explicitly approves promotion.
      - Frontmatter validates against required zettel fields.
      - Promotion checklist has no blocking failures.
    writes:
      - zettels/*.md
      - receipts/*.yml
    outputs:
      - canonical_zettel_id
      - canonical_path
      - receipt_id
    receipt:
      required: true
      records:
        - source_draft
        - created_zettel
        - actor
        - approval_context
        - promotion_checklist

  - action_id: revise_canonical_zettel
    display_name: Revise canonical zettel
    status: draft
    category: zettel
    description: Revise an existing canonical zettel while preserving history for meaning-changing edits.
    actor_types:
      - person
      - ai_runtime
    inputs:
      required:
        - zettel_id
        - revision_summary
      optional:
        - change_type
        - supersedes
        - receipt_required
    policy_checks:
      - mounted_archives_only
      - canonical_revision_preserves_history
      - provider_urls_forbidden_in_zettels
    preconditions:
      - Zettel exists in zettels/.
      - Change type is classified as small_correction or meaning_change.
      - Meaning-changing edits create a receipt, revision note, or superseding zettel.
    writes:
      - zettels/*.md
      - receipts/*.yml
    outputs:
      - zettel_id
      - receipt_id
      - superseding_zettel_id
    receipt:
      required: conditional

  - action_id: link_zettels
    display_name: Link zettels
    status: draft
    category: relation
    description: Create a typed edge between two zettels or archive entities.
    actor_types:
      - person
      - ai_runtime
    inputs:
      required:
        - from_id
        - to_id
        - link_type
      optional:
        - visibility
        - provenance
        - note
    policy_checks:
      - mounted_archives_only
      - allowed_link_type_only
    preconditions:
      - Source entity exists.
      - Target entity exists or is represented as an external reference.
      - Link type is defined in zettel-kasten/types.yml.
    writes:
      - zettel frontmatter edges
      - db.edges
    outputs:
      - edge_id
    receipt:
      required: false

  - action_id: attach_object
    display_name: Attach original object
    status: draft
    category: object
    description: Attach an original file object to a zettel through object_id, not provider URL.
    actor_types:
      - person
      - ai_runtime
    inputs:
      required:
        - zettel_id
        - object_id
        - role
      optional:
        - label
    policy_checks:
      - object_identity_by_sha256
      - provider_urls_forbidden_in_zettels
      - mounted_archives_only
    preconditions:
      - Object exists in objects/manifests/files.jsonl or will be registered before attach.
      - Zettel exists in inbox or zettels.
    writes:
      - zettel frontmatter assets
      - db.zettel_assets
    outputs:
      - zettel_id
      - object_id
    receipt:
      required: false

  - action_id: derive_zettel
    display_name: Derive zettel
    status: draft
    category: cross_archive
    description: Create a new zettel from another record while preserving provenance and hiding private source details when required.
    actor_types:
      - person
      - ai_runtime
    inputs:
      required:
        - source_zettel_id
        - target_archive_id
        - derivation_mode
      optional:
        - redaction_policy
        - target_facets
        - title
    policy_checks:
      - private_source_not_revealed_by_default
      - cross_archive_share_requires_explicit_mode
      - mounted_archives_only
    preconditions:
      - Source archive is mounted with read access.
      - Target archive is mounted with write access.
      - Derivation mode is explicit.
    writes:
      - target inbox/*.md
      - receipts/*.yml
    outputs:
      - derived_zettel_id
      - receipt_id
    receipt:
      required: true

  - action_id: share_to_archive
    display_name: Share to archive
    status: draft
    category: cross_archive
    description: Share a zettel or object with another archive by reference, copy, mount, or derivative summary.
    actor_types:
      - person
      - ai_runtime
    inputs:
      required:
        - source_id
        - target_archive_id
        - mode
      optional:
        - expires_at
        - reveal_source
        - include_originals
    policy_checks:
      - cross_archive_share_requires_explicit_mode
      - private_source_not_revealed_by_default
      - workpack_import_requires_receipt
    preconditions:
      - Human approval is present.
      - Mode is one of reference, copy, mount, derive.
      - Target archive boundary is explicit.
    writes:
      - workpacks/*/package.yml
      - receipts/*.yml
    outputs:
      - package_id
      - receipt_id
    receipt:
      required: true

  - action_id: transfer_to_archive
    display_name: Transfer to archive
    status: draft
    category: cross_archive
    description: Transfer authority or ownership of a record or object to another archive.
    actor_types:
      - person
    inputs:
      required:
        - source_id
        - target_archive_id
        - transfer_reason
      optional:
        - retain_reference
        - redaction_policy
    policy_checks:
      - destructive_transfer_requires_human_confirmation
      - cross_archive_share_requires_explicit_mode
      - provenance_required
    preconditions:
      - Human approval is explicit.
      - Transfer reason is recorded.
      - Receipt path is available.
    writes:
      - receipts/*.yml
      - db.edges
      - target archive records
    outputs:
      - receipt_id
      - transferred_id
    receipt:
      required: true

  - action_id: inherit_to_archive
    display_name: Inherit to archive
    status: draft
    category: succession
    description: Transfer or copy selected records to a successor, child, family, role, or future archive.
    actor_types:
      - person
    inputs:
      required:
        - subject_principal_id
        - target_archive_id
        - selection
      optional:
        - redaction_policy
        - guardians
        - retain_family_reference
    policy_checks:
      - destructive_transfer_requires_human_confirmation
      - provenance_required
      - private_source_not_revealed_by_default
    preconditions:
      - Human approval is explicit.
      - Selection is scoped.
      - Redaction needs are reviewed.
    writes:
      - receipts/*.yml
      - target archive records
    outputs:
      - receipt_id
      - inherited_records
    receipt:
      required: true

  - action_id: pack_work_context
    display_name: Pack work context
    status: draft
    category: workpack
    description: Create a portable workpack from a view, zettel selection, or task context.
    actor_types:
      - person
      - ai_runtime
    inputs:
      required:
        - source_archive
        - mode
        - purpose
      optional:
        - view_id
        - zettel_ids
        - object_ids
        - target_archive
        - expires_at
    policy_checks:
      - cross_archive_share_requires_explicit_mode
      - private_source_not_revealed_by_default
      - large_media_references_only_by_default
    preconditions:
      - Package purpose is recorded.
      - Contents are scoped.
      - Permissions are explicit.
    writes:
      - workpacks/*/package.yml
      - workpacks/*/zettels/
      - workpacks/*/manifests/
    outputs:
      - package_id
      - package_path
    receipt:
      required: false

  - action_id: import_workpack
    display_name: Import workpack
    status: draft
    category: workpack
    description: Import or mount a workpack into a target archive after policy checks.
    actor_types:
      - person
      - ai_runtime
    inputs:
      required:
        - package_path
        - target_archive
      optional:
        - dry_run
        - import_mode
    policy_checks:
      - workpack_import_requires_receipt
      - mounted_archives_only
      - provenance_required
    preconditions:
      - Package manifest exists.
      - Checksums pass or warnings are recorded.
      - Permissions allow target import mode.
    writes:
      - target inbox/
      - target objects/manifests/files.jsonl
      - target receipts/
    outputs:
      - receipt_id
      - imported_records
      - warnings
    receipt:
      required: true

  - action_id: archive_doctor
    display_name: Archive doctor
    status: implemented
    category: cli
    description: Inspect an archive for missing required files, invalid frontmatter, forbidden provider URLs, manifest problems, and unsafe policy violations.
    actor_types:
      - person
      - ai_runtime
    inputs:
      required:
        - archive_root
      optional:
        - strict
        - fix
    policy_checks:
      - read_only_by_default_for_doctor
      - promotion_checklist_required
    preconditions:
      - Archive root exists.
    writes:
      - diagnostics report
    outputs:
      - diagnostics
      - warnings
      - errors
    receipt:
      required: false

  - action_id: archive_init
    display_name: Archive init
    status: implemented
    category: cli
    description: Initialize a new archive from a template with safe defaults.
    actor_types:
      - person
      - ai_runtime
    inputs:
      required:
        - archive_root
        - archive_type
        - archive_id
        - principal_id
      optional:
        - name
        - template
    policy_checks:
      - secrets_never_committed
      - safe_defaults_required
    preconditions:
      - Target path is empty or explicitly approved for initialization.
    writes:
      - archive.yml
      - AGENTS.md
      - inbox/
      - zettels/
      - views/
      - objects/manifests/files.jsonl
      - zettel-kasten/types.yml
      - zettel-kasten/actions.yml
      - zettel-kasten/policies.yml
      - zettel-kasten/zettel-rules.yml
      - db/schema.sql
    outputs:
      - archive_root
      - created_files
    receipt:
      required: false

  - action_id: record_project_minutes
    display_name: Record project minutes
    status: draft
    category: governance
    description: Append substantial project conversations, decisions, implementation notes, and corrections to meeting minutes.
    actor_types:
      - person
      - ai_runtime
    inputs:
      required:
        - summary
        - files_changed
        - decisions
      optional:
        - doubts
        - corrections
        - next_steps
    policy_checks:
      - project_memory_required
    preconditions:
      - The conversation or implementation is substantial.
    writes:
      - meeting-minutes/*.md
    outputs:
      - minutes_path
    receipt:
      required: false

  - action_id: record_decision_log
    display_name: Record decision log
    status: draft
    category: governance
    description: Record compact architecture decisions and consequences.
    actor_types:
      - person
      - ai_runtime
    inputs:
      required:
        - decision
        - context
        - consequences
      optional:
        - related_minutes
    policy_checks:
      - project_memory_required
    preconditions:
      - A durable project decision was made.
    writes:
      - archive-infra-decision-log-*.md
    outputs:
      - decision_log_path
    receipt:
      required: false
