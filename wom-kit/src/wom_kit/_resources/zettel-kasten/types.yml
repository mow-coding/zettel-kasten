schema_version: wom-kit/zettel-kasten-types/v0.2-draft
zettel_kasten_id: zettel-kasten:wom-kit:base
status: draft
description: >
  Base zettel-kasten types for a PC-first, AI-native, zettel-centered archive.
  These definitions describe the main entities, value types, and link types
  used by WOM-kit v0.2.

value_types:
  - id: archive_id
    base: string
    pattern_hint: "archive:<kind>:<name>"
    examples:
      - archive:personal:example
      - archive:company:example

  - id: principal_id
    base: string
    pattern_hint: "<kind>:<name>"
    examples:
      - person:example
      - company:example
      - family:example

  - id: zettel_id
    base: string
    pattern_hint: "zet_<YYYYMMDD>_<slug-or-id>"
    examples:
      - zet_20260519_example

  - id: object_id
    base: string
    pattern_hint: "sha256:<64 lowercase hex characters>"
    examples:
      - sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa

  - id: datetime
    base: string
    format_hint: RFC3339
    examples:
      - 2026-05-19T12:00:00+09:00

  - id: relative_path
    base: string
    rule: Must be relative to the archive root unless a policy explicitly allows otherwise.

  - id: visibility_scope
    base: enum
    values:
      - private
      - shared
      - family
      - company
      - public
      - redacted

  - id: zettel_status
    base: enum
    values:
      - draft
      - canonical
      - archived
      - redacted

  - id: zettel_kind
    base: enum
    values:
      - fleeting_capture
      - source_note
      - permanent_note
      - record_note
      - decision_note
      - meeting_minutes
      - object_summary
      - project_note

  - id: promotion_stage
    base: enum
    values:
      - captured
      - draft
      - promotion_candidate
      - promoted
      - revised
      - superseded
      - archived
      - redacted

  - id: workpack_mode
    base: enum
    values:
      - reference
      - copy
      - mount
      - derive
      - handover
      - return

entity_types:
  - id: Archive
    description: A sovereign memory space mounted by an AI runtime through a keyring profile.
    primary_key: archive_id
    storage:
      yaml: archive.yml
      sqlite_table: archives
    required_properties:
      - archive_id
      - name
      - type
      - principal
      - root_policy
      - ai_write_policy
      - storage_policy
    properties:
      archive_id:
        value_type: archive_id
      name:
        value_type: string
      type:
        value_type: enum
        values:
          - personal
          - company
          - family
          - project
          - relationship
          - handover
          - workpack
      principal:
        value_type: object
      mounted_archives:
        value_type: list

  - id: Principal
    description: A person, family, company, team, role, child, or other actor that owns or uses records.
    primary_key: principal_id
    storage:
      yaml: archive.yml
      sqlite_table: principals
      sqlite_status: planned
    required_properties:
      - principal_id
      - kind
      - display_name
    properties:
      principal_id:
        value_type: principal_id
      kind:
        value_type: enum
        values:
          - person
          - family
          - household
          - child
          - company
          - team
          - project
          - role
          - client
          - future_successor
      display_name:
        value_type: string

  - id: Zettel
    description: The durable human-readable memory unit.
    primary_key: id
    storage:
      markdown_frontmatter:
        - zettels/
        - inbox/
      sqlite_table: zettels
    required_properties:
      - id
      - title
      - created_at
      - updated_at
      - archive_id
      - status
      - facets
      - assets
      - edges
      - provenance
      - visibility
    properties:
      id:
        value_type: zettel_id
      title:
        value_type: string
      created_at:
        value_type: datetime
      updated_at:
        value_type: datetime
      archive_id:
        value_type: archive_id
      status:
        value_type: zettel_status
      kind:
        value_type: zettel_kind
      facets:
        value_type: object
      assets:
        value_type: list
      edges:
        value_type: list
      provenance:
        value_type: object
      visibility:
        value_type: object
      promotion:
        value_type: object

  - id: OriginalObject
    description: A content-addressed original file such as a PDF, scan, photo, video, audio file, or export.
    primary_key: object_id
    storage:
      jsonl: objects/manifests/files.jsonl
      sqlite_table: objects
    required_properties:
      - object_id
      - sha256
      - logical_key
      - locations
      - provenance
    properties:
      object_id:
        value_type: object_id
      sha256:
        value_type: string
      logical_key:
        value_type: relative_path
      mime:
        value_type: string
      size_bytes:
        value_type: integer
      locations:
        value_type: list
      provenance:
        value_type: object

  - id: ObjectLocation
    description: A physical or remote location where an OriginalObject can be found.
    primary_key:
      - object_id
      - provider
      - location_ref
    storage:
      jsonl_field: objects/manifests/files.jsonl.locations
      sqlite_table: object_locations
    required_properties:
      - object_id
      - provider
      - location_ref
    properties:
      object_id:
        value_type: object_id
      provider:
        value_type: enum
        values:
          - local
          - external_ssd
          - backblaze_b2
          - cloudflare_r2
          - aws_s3
          - google_drive_export
      location_ref:
        value_type: string
      availability:
        value_type: enum
        values:
          - available
          - offline
          - missing
          - unknown

  - id: View
    description: An AI-facing saved filter and context policy.
    primary_key: id
    storage:
      yaml: views/
      sqlite_table: views
    required_properties:
      - id
      - name
      - for
      - filters
      - include
      - context_policy
    properties:
      id:
        value_type: string
      name:
        value_type: string
      for:
        value_type: enum
        values:
          - ai_context
          - export
          - workpack
      filters:
        value_type: object
      include:
        value_type: object
      sort:
        value_type: list
      context_policy:
        value_type: object

  - id: Workpack
    description: A portable archive slice for moving only necessary context between PCs, people, companies, or family archives.
    primary_key: package_id
    storage:
      yaml: workpacks/*/package.yml
      sqlite_table: workpacks
    required_properties:
      - package_id
      - source_archive
      - mode
      - purpose
      - contents
      - permissions
      - provenance
    properties:
      package_id:
        value_type: string
      source_archive:
        value_type: archive_id
      target_archive:
        value_type: archive_id
      mode:
        value_type: workpack_mode
      purpose:
        value_type: string
      contents:
        value_type: object
      permissions:
        value_type: object
      provenance:
        value_type: object
      expires_at:
        value_type: datetime

  - id: Capability
    description: An explicit permission granted to a principal, archive, action, or workpack.
    primary_key: capability_id
    storage:
      yaml: zettel-kasten/policies.yml
      sqlite_table: capabilities
      sqlite_status: planned
    required_properties:
      - capability_id
      - principal_id
      - scope
      - actions
    properties:
      capability_id:
        value_type: string
      principal_id:
        value_type: principal_id
      scope:
        value_type: object
      actions:
        value_type: list
      expires_at:
        value_type: datetime

  - id: Receipt
    description: An audit record created after import, promotion, transfer, share, or other important state changes.
    primary_key: receipt_id
    storage:
      yaml: receipts/
      sqlite_table: receipts
      sqlite_status: planned
    required_properties:
      - receipt_id
      - action_id
      - actor
      - created_at
      - result
    properties:
      receipt_id:
        value_type: string
      action_id:
        value_type: string
      actor:
        value_type: principal_id
      created_at:
        value_type: datetime
      result:
        value_type: object
      warnings:
        value_type: list

  - id: ActionRun
    description: A concrete execution of an action type.
    primary_key: action_run_id
    storage:
      yaml: receipts/
      sqlite_table: action_runs
      sqlite_status: planned
    required_properties:
      - action_run_id
      - action_id
      - actor
      - started_at
      - status
    properties:
      action_run_id:
        value_type: string
      action_id:
        value_type: string
      actor:
        value_type: principal_id
      started_at:
        value_type: datetime
      finished_at:
        value_type: datetime
      status:
        value_type: enum
        values:
          - planned
          - running
          - completed
          - failed
          - cancelled

link_types:
  - id: references
    description: One record cites or points to another record or object.
    from:
      - Zettel
      - View
      - Workpack
    to:
      - Zettel
      - OriginalObject
      - View
      - Workpack
    storage:
      frontmatter: edges
      sqlite_table: edges

  - id: derived_from
    description: A record was created from another source while preserving provenance.
    from:
      - Zettel
      - Workpack
      - Receipt
    to:
      - Zettel
      - OriginalObject
      - Workpack
    policy_notes:
      - Private sources must not be revealed unless policy allows it.

  - id: material
    description: The target zet or object is source material used by the current zet.
    from:
      - Zettel
    to:
      - Zettel
      - OriginalObject
    policy_notes:
      - Private sources must not be revealed unless policy allows it.

  - id: derived
    description: The target zet is a later product, follow-up, or derived output of the current zet.
    from:
      - Zettel
    to:
      - Zettel
    policy_notes:
      - Direction matters; use material for inputs and derived for outputs.

  - id: continues
    description: The target zet directly continues this zet's own line of thought or is the next installment in the SAME work. Use for same-thread follow-on only. Not derived_from (source/provenance), not references (topical citation), not derived (a distinct later product built from this zet), not supersedes (replacing an older version), and not a generic ordered process step.
    from:
      - Zettel
    to:
      - Zettel

  - id: semantic
    description: The target zet is meaningfully related, but the relation needs human wording before it becomes more specific.
    from:
      - Zettel
    to:
      - Zettel

  - id: embed
    description: The current zet explicitly embeds or uses an object.
    from:
      - Zettel
    to:
      - OriginalObject

  - id: mention
    description: The current zet explicitly mentions another zet or imported page.
    from:
      - Zettel
    to:
      - Zettel

  - id: contains
    description: The current zet structurally contains a child zet, page, database, view, or package.
    from:
      - Zettel
      - View
      - Workpack
    to:
      - Zettel
      - View
      - Workpack
    policy_notes:
      - Use for structural nesting such as Notion child_page, child_database, or collection_view evidence.
      - Do not use as a fallback for source material, references, database view-query snapshots, or inheritance.

  - id: view_query
    description: A relation comes from a reviewed static snapshot of a database view or filter result.
    from:
      - View
      - Zettel
    to:
      - Zettel
    policy_notes:
      - Dynamic views and filters must be reviewed as static snapshots before durable edges are written.

  - id: comment_context
    description: A relation came from comment or discussion context and should stay separate from the zet body.
    from:
      - Zettel
    to:
      - Zettel
    policy_notes:
      - Do not store raw comment bodies in edge metadata.

  - id: shared_with
    description: A record or object is explicitly shared with another archive or principal.
    from:
      - Zettel
      - OriginalObject
      - Workpack
    to:
      - Archive
      - Principal

  - id: copied_to
    description: A physical or logical copy was created in another archive or package.
    from:
      - Zettel
      - OriginalObject
      - Workpack
    to:
      - Archive
      - Workpack

  - id: mounted_by
    description: An archive or workpack is mounted by a keyring profile or active runtime.
    from:
      - Archive
      - Workpack
    to:
      - Principal

  - id: transferred_to
    description: Authority or ownership moved from one archive or principal to another.
    from:
      - Zettel
      - OriginalObject
      - Workpack
    to:
      - Archive
      - Principal
    policy_notes:
      - Requires explicit human approval.
      - Requires receipt.

  - id: inherited_by
    description: A record or object is passed to a successor, child, household, role, or future archive.
    from:
      - Zettel
      - OriginalObject
      - Archive
    to:
      - Principal
      - Archive

  - id: supersedes
    description: A newer record replaces an older record.
    from:
      - Zettel
    to:
      - Zettel

  - id: redacts
    description: A record is a safer or narrower version of another record.
    from:
      - Zettel
      - Workpack
    to:
      - Zettel
      - OriginalObject

  - id: summarizes
    description: A record summarizes a longer record, object, view, or package.
    from:
      - Zettel
    to:
      - Zettel
      - OriginalObject
      - View
      - Workpack

  - id: applies_to
    description: A policy, action, view, or zettel applies to another entity.
    from:
      - Zettel
      - View
      - Workpack
      - Capability
    to:
      - Archive
      - Principal
      - Zettel
      - OriginalObject
      - Workpack

  - id: handover_to
    description: Operational context is prepared for another principal, role, team, or archive.
    from:
      - Workpack
      - Zettel
    to:
      - Principal
      - Archive

facet_sets:
  - id: core_facets
    description: Stable axes for AI retrieval. Tags remain loose and temporary; facets are structured.
    recommended_keys:
      - domain
      - record_type
      - institution
      - organization
      - project
      - education_stage
      - school_year
      - term
      - activity_group
      - subject
      - course_code
      - person
      - location
      - emotion
      - visibility
      - privacy
