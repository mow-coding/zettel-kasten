archive_id: archive:family:template
name: Family Archive Template
type: family
principal:
  principal_id: family:template
  display_name: Template Family
  kind: household
members:
  - principal_id: person:member-a
    role: parent_operator
  - principal_id: person:member-b
    role: parent_operator
dependents:
  - principal_id: person:child-template
    relationship: child
root_policy:
  canonical_zettels: zettels/
  ai_inbox: inbox/
  views: views/
  object_manifest: objects/manifests/files.jsonl
  sqlite_schema: db/schema.sql
ai_write_policy:
  default: inbox_only
  canonical_requires: human_minting
storage_policy:
  object_identity: sha256
  provider_urls_in_zettels: forbidden
  locations_live_in_manifest: true
mounted_archives: []
