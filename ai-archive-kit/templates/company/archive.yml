archive_id: archive:company:template
name: Company Archive Template
type: company
principal:
  principal_id: company:template
  display_name: Template Company
  kind: company
root_policy:
  canonical_zettels: zettels/
  ai_inbox: inbox/
  views: views/
  object_manifest: objects/manifests/files.jsonl
  sqlite_schema: db/schema.sql
ai_write_policy:
  default: inbox_only
  canonical_requires: human_minting
storage_policy:
  object_identity: sha256
  provider_urls_in_zettels: forbidden
  locations_live_in_manifest: true
mounted_archives: []
